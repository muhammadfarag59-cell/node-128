<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    
    <nav class="navbar navbar-dark bg-dark ">
        <div class="container-fluid">
          <span class="navbar-brand mb-0 h1">Student Dashboard</span>
        </div>
      </nav>


      <div class="container mt-4 ">
        <h2 class="mb-3">Add Student</h2>
        <form id="studentForm"  class="row g-3">
            <div class="col-4">
                <input type="text" id="name" class="form-control" placeholder="Student name" aria-label="Student name" required>
              </div>
              <div class="col-4">
                <input type="text" id="age" class="form-control" placeholder="Age" aria-label="age" required>
              </div>
              <div class="col-4">
                <input type="text" id="course" class="form-control" placeholder="course" aria-label="course" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary">Add Student</button>
              </div>
        </form>


        <hr>
        <h3>
            student List
        </h3>
        <table class="table table-borderd mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Operations</th>
                </tr>
            </thead>
            <tbody id="studentTable">
               
            </tbody>

        </table>
      </div>

  
  <!-- Modal -->
  <div class="modal fade" id="updateModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Update Student</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="updateForm">
            <input type="hidden" id="updateIndex">
            <div class="mb-3">
                <label for="" class="form-label">Student Name</label>
                <input type="text" class="form-control" id="updateName" required>
            </div>
            <div class="mb-3">
                <label for="" class="form-label">Age</label>
                <input type="number" class="form-control" id="updateAge" required>
            </div>
            <div class="mb-3">
                <label for="" class="form-label">Course</label>
                <input type="text" class="form-control" id="updateCourse" required>
            </div>
            <button class="btn btn-warning w-100">Update Changes</button>
          </form>
        </div>
       
      </div>
    </div>
  </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="shop.js"></script>
</body>
</html>
